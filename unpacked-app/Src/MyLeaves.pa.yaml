Screens:
  MyLeaves:
    Properties:
      OnVisible: |-
        =Set(isLoading, true);
        ClearCollect(colLeaveRequests, 
          ShowColumns(
            AddColumns(LeaveRequests_1, "Id", ID), 
            "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
          )
        );
        ClearCollect(colMyLeaves, Filter(colLeaveRequests, EmployeeId = currentUserId));
        Set(isLoading, false);
    Children:
      - MyLeaves_Title:
          Control: ModernText
          Properties:
            Text: ="My Leaves"
            Color: =TextColor
            FontWeight: =FontWeight.Bold
            Size: =24
            X: =16
            Y: =16
      - Refresh:
          Control: ModernButton
          Properties:
            Text: ="Refresh"
            BasePaletteColor: =PrimaryColor
            Color: =RGBA(255,255,255,1)
            X: =16
            Y: =56
            OnSelect: |-
              =Set(isLoading, true);
              ClearCollect(colLeaveRequests, 
                ShowColumns(
                  AddColumns(LeaveRequests_1, "Id", ID), 
                  "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
                )
              );
              ClearCollect(colMyLeaves, Filter(colLeaveRequests, EmployeeId = currentUserId));
              Set(isLoading, false);
              Notify("Leave history refreshed.", NotificationType.Success)
      - LeavesGrid:
          Control: ModernDataGrid
          Properties:
            Items: =colMyLeaves
            X: =16
            Y: =100
            Width: =Parent.Width - 32
            Height: =560
      - SelectedText:
          Control: ModernText
          Properties:
            Text: |-
              ="Selected: " & If(!IsBlank(LeavesGrid.Selected), LeavesGrid.Selected.LeaveTypeKey & " (" & LeavesGrid.Selected.Status & ")", "No request selected")
            Color: =TextColor
            X: =16
            Y: =680
            Size: =14

