Screens:
  Dashboard:
    Properties:
      OnVisible: |-
        =Set(isLoading, true);
        ClearCollect(colLeaveBalances, LeaveBalances);
        ClearCollect(colLeaveRequests, LeaveRequests);
        Set(myTotalBalance, Sum(Filter(colLeaveBalances, EmployeeId = currentUserId), BalanceDays));
        ClearCollect(colMyRecentRequests, Filter(colLeaveRequests, EmployeeId = currentUserId));
        ClearCollect(colQuickActions, Table({Key: "ApplyLeave", Label: "Apply Leave"}, {Key: "MyLeaves", Label: "My Leaves"}));
        Set(isLoading, false);
    Children:
      - HeaderText:
          Control: ModernText
          Properties:
            Text: ="Dashboard"
            Color: =TextColor
            Size: =24
            X: =16
            Y: =16
      - BalanceCard:
          Control: ModernCard
          Properties:
            Title: ="Leave Balance"
            Subtitle: =Text(myTotalBalance) & " days remaining"
            X: =16
            Y: =56
            Width: =320
            Height: =140
      - QuickActionsGallery:
          Control: Gallery
          Variant: Vertical
          Properties:
            X: =360
            Y: =56
            Width: =420
            Height: =140
            Items: =colQuickActions
          Children:
            - ActionButton:
                Control: ModernButton
                Properties:
                  Text: =ThisItem.Label
                  Width: =Parent.TemplateWidth - 24
                  Height: =40
                  X: =12
                  Y: =12
                  OnSelect: =Navigate(If(ThisItem.Key = "ApplyLeave", ApplyLeave, MyLeaves))
      - RecentRequestsGrid:
          Control: ModernDataGrid
          Properties:
            X: =16
            Y: =220
            Width: =764
            Height: =320
            Items: =colMyRecentRequests

