Dashboard As screen:

    OnVisible: =Set(isLoading, true); Set(myTotalBalance, Sum(Filter(colLeaveBalances, EmployeeId = currentUserId), BalanceDays)); ClearCollect(colMyRecentRequests, Filter(colLeaveRequests, EmployeeId = currentUserId)); ClearCollect(colQuickActions, Table({Key: "ApplyLeave", Label: "Apply Leave"}, {Key: "MyLeaves", Label: "My Leaves"})); Set(isLoading, false);

    HeaderText As label:
        Text: ="Dashboard"
        Color: =TextColor
        Size: =24
        X: =16
        Y: =16

    BalanceCard As label:
        Title: ="Leave Balance"
        X: =16
        Y: =56
        Width: =320
        Height: =140

    QuickActionsGallery As gallery:
        Layout: =Vertical
        X: =360
        Y: =56
        Width: =420
        Height: =140
        Items: =colQuickActions
        QuickActionsGallery_Template As galleryTemplate:
            ActionButton As button:
                Text: =ThisItem.Label
                Width: =200
                Height: =40
                X: =10
                Y: =10
                OnSelect: =Navigate(If(ThisItem.Key = "ApplyLeave", ApplyLeave, MyLeaves))

    RecentRequestsGrid As datagrid:
        X: =16
        Y: =220
        Width: =764
        Height: =320
        Items: =colMyRecentRequests
        OnChange: =Set(selectedRequest, RecentRequestsGrid.Selected)