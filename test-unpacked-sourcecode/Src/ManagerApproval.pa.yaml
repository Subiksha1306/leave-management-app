Screens:
  ManagerApproval:
    Properties:
      OnVisible: |-
        =Set(isLoading, true);
        ClearCollect(colLeaveRequests,
          ShowColumns(
            AddColumns(LeaveRequests_1, "Id", ID),
            "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
          )
        );
        Set(ManagerQueue, Filter(colLeaveRequests, Status = "Pending" && ManagerId = currentUserId));
        Set(showRejectModal, false);
        Set(rejectReason, "");
        Set(isLoading, false);
      Fill: =BackgroundColor
    Children:
      - ManagerApproval_Title:
          Control: ModernText
          Properties:
            Text: ="Manager Approval"
            Color: =TextColor
            Size: =20
            X: =20
            Y: =20
      - RequestsGrid:
          Control: ModernDataGrid
          Properties:
            X: =20
            Y: =70
            Width: =1200
            Height: =500
            Items: =ManagerQueue
      - ApproveButton:
          Control: ModernButton
          Properties:
            Text: ="Approve"
            X: =20
            Y: =590
            Width: =120
            BasePaletteColor: =PrimaryColor
            Color: =RGBA(255,255,255,1)
            OnSelect: |-
              =If(
                IsBlank(RequestsGrid.Selected),
                Notify("Select a request to approve", NotificationType.Error),
                Set(isLoading, true);
                Patch(LeaveRequests_1, LookUp(LeaveRequests_1, ID = RequestsGrid.Selected.Id), {Status: "Approved"});
                With({
                    currentBalance: LookUp(LeaveBalances, EmployeeId = RequestsGrid.Selected.EmployeeId && LeaveTypeKey = RequestsGrid.Selected.LeaveTypeKey)
                },
                    If(!IsBlank(currentBalance),
                        Patch(LeaveBalances, currentBalance, {
                            BalanceDays: Max(0, currentBalance.BalanceDays - RequestsGrid.Selected.Days)
                        })
                    )
                );
                ClearCollect(colLeaveRequests,
                  ShowColumns(
                    AddColumns(LeaveRequests_1, "Id", ID),
                    "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
                  )
                );
                ClearCollect(colLeaveBalances, 
                  ShowColumns(
                    AddColumns(LeaveBalances, "Id", EmployeeId), 
                    "EmployeeId", "LeaveTypeKey", "BalanceDays"
                  )
                );
                Set(ManagerQueue, Filter(colLeaveRequests, Status = "Pending" && ManagerId = currentUserId));
                Set(isLoading, false);
                Notify("Request approved", NotificationType.Success)
              )
      - RejectButton:
          Control: ModernButton
          Properties:
            Text: ="Reject"
            X: =150
            Y: =590
            Width: =120
            BasePaletteColor: =RGBA(255,90,60,1)
            Color: =RGBA(255,255,255,1)
            OnSelect: =If(IsBlank(RequestsGrid.Selected), Notify("Select a request to reject", NotificationType.Error), Set(showRejectModal, true); Set(rejectReason, ""))
      - RejectModal:
          Control: GroupContainer
          Variant: ManualLayout
          Properties:
            Visible: =showRejectModal
            X: =400
            Y: =200
            Width: =600
            Height: =300
          Children:
            - RejectTitle:
                Control: ModernText
                Properties:
                  Text: ="Reject Request"
                  Size: =18
                  X: =20
                  Y: =20
            - RejectReasonInput:
                Control: ModernTextInput
                Properties:
                  Placeholder: ="Enter rejection reason"
                  X: =20
                  Y: =60
                  Width: =560
                  Default: =rejectReason
                  OnChange: =Set(rejectReason, Self.Text)
            - ConfirmReject:
                Control: ModernButton
                Properties:
                  Text: ="Confirm Reject"
                  X: =20
                  Y: =220
                  Width: =160
                  BasePaletteColor: =RGBA(255,90,60,1)
                  Color: =RGBA(255,255,255,1)
                  OnSelect: |-
                    =If(
                      IsBlank(rejectReason),
                      Notify("Provide a reason to reject", NotificationType.Error),
                      Set(isLoading, true);
                      Patch(LeaveRequests_1, LookUp(LeaveRequests_1, ID = RequestsGrid.Selected.Id), {Status: "Rejected", RejectionReason: rejectReason});
                      ClearCollect(colLeaveRequests,
                        ShowColumns(
                          AddColumns(LeaveRequests_1, "Id", ID),
                          "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
                        )
                      );
                      Set(showRejectModal, false);
                      Set(ManagerQueue, Filter(colLeaveRequests, Status = "Pending" && ManagerId = currentUserId));
                      Set(isLoading, false);
                      Notify("Request rejected", NotificationType.Success)
                    )
            - CancelReject:
                Control: ModernButton
                Properties:
                  Text: ="Cancel"
                  X: =200
                  Y: =220
                  Width: =120
                  OnSelect: =Set(showRejectModal, false)

