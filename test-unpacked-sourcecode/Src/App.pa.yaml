App:
  Properties:
    StartScreen: =Dashboard
    Formulas: |-
      =// Named constants and helper functions
      PrimaryColor = RGBA(56,96,178,1);
      AccentColor = RGBA(255,90,60,1);
      BackgroundColor = RGBA(250,250,250,1);
      CardColor = RGBA(255,255,255,1);
      TextColor = RGBA(33,33,33,1);

      // Status color helper
      GetStatusColor(status: Text): Color =
        If(
          status = "Approved", RGBA(34,197,94,1),
          status = "Rejected", RGBA(239,68,68,1),
          status = "Pending", RGBA(245,158,11,1),
          RGBA(107,114,128,1) // default/unknown
        );

      // Date range text helper
      FormatDateRange(fromDate: DateTime, toDate: DateTime): Text =
        If(
          fromDate = toDate,
          Text(fromDate, "mmmm d, yyyy"),
          Text(fromDate, "mmmm d, yyyy") & " â€“ " & Text(toDate, "mmmm d, yyyy")
        );

    OnStart: |-
      =// Read initial data from SharePoint lists into local collections
      ClearCollect(colLeaveTypes, 
        ShowColumns(
          AddColumns(LeaveTypes, "DisplayName", Title), 
          "ID", "Key", "DisplayName"
        )
      );

      ClearCollect(colEmployees, 
        ShowColumns(
          AddColumns(Employees, "Id", EmployeeId, "DisplayName", Title), 
          "Id", "DisplayName", "Email", "ManagerId"
        )
      );

      ClearCollect(colLeaveBalances, 
        ShowColumns(
          AddColumns(LeaveBalances, "Id", EmployeeId), 
          "EmployeeId", "LeaveTypeKey", "BalanceDays"
        )
      );

      ClearCollect(colLeaveRequests, 
        ShowColumns(
          AddColumns(LeaveRequests_1, "Id", ID), 
          "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
        )
      );

      Set(isLoading, false);
      // Initialize commonly used variables to non-Blank values so the compiler can infer types
      Set(selectedRequest, First(colLeaveRequests));
      Set(selectedLeaveType, First(colLeaveTypes));
      Set(Days, 0);
      Set(SampleCardImage, "");
      Set(SampleCardHeaderImage, "");
      Set(Progress, 0);
      Set(Descending, true);
      Set(currentUserId, 1);
      Set(currentUserIsManager, LookUp(colEmployees, Id = currentUserId, ManagerId) = 0);



