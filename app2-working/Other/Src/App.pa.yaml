App:
  Properties:
    StartScreen: =Dashboard
    Formulas: |-
      =// Named constants and helper functions
      PrimaryColor = RGBA(56,96,178,1);
      AccentColor = RGBA(255,90,60,1);
      BackgroundColor = RGBA(250,250,250,1);
      CardColor = RGBA(255,255,255,1);
      TextColor = RGBA(33,33,33,1);

      // Status color helper
      GetStatusColor(status: Text): Color =
        If(
          status = "Approved", RGBA(34,197,94,1),
          status = "Rejected", RGBA(239,68,68,1),
          status = "Pending", RGBA(245,158,11,1),
          RGBA(107,114,128,1) // default/unknown
        );

      // Date range text helper
      FormatDateRange(fromDate: DateTime, toDate: DateTime): Text =
        If(
          fromDate = toDate,
          Text(fromDate, "mmmm d, yyyy"),
          Text(fromDate, "mmmm d, yyyy") & " - " & Text(toDate, "mmmm d, yyyy")
        );

    OnStart: |-
      // Auto-seed SharePoint lists if they are empty using bulk Table collects to prevent syntax issues
      If(CountRows(LeaveTypes) = 0,
        Collect(LeaveTypes,
          Table(
            {Title: "Annual Leave", Key: "Annual"},
            {Title: "Sick Leave", Key: "Sick"},
            {Title: "Unpaid Leave", Key: "Unpaid"}
          )
        )
      );

      If(CountRows(Employees) = 0,
        Collect(Employees,
          Table(
            {Title: "Alice Johnson", EmployeeId: 1, Email: "alice@contoso.com", ManagerId: 3},
            {Title: "Bob Lee", EmployeeId: 2, Email: "bob@contoso.com", ManagerId: 3},
            {Title: "Carol Smith", EmployeeId: 3, Email: "carol@contoso.com", ManagerId: 0}
          )
        )
      );

      If(CountRows(LeaveBalances) = 0,
        Collect(LeaveBalances,
          Table(
            {Title: "Alice Johnson - Annual", EmployeeId: 1, LeaveTypeKey: "Annual", BalanceDays: 12},
            {Title: "Alice Johnson - Sick", EmployeeId: 1, LeaveTypeKey: "Sick", BalanceDays: 8},
            {Title: "Bob Lee - Annual", EmployeeId: 2, LeaveTypeKey: "Annual", BalanceDays: 5},
            {Title: "Bob Lee - Sick", EmployeeId: 2, LeaveTypeKey: "Sick", BalanceDays: 10}
          )
        )
      );

      If(CountRows(LeaveRequests_1) = 0,
        Collect(LeaveRequests_1,
          Table(
            {Title: "Alice Johnson - Annual Request", EmployeeId: 1, LeaveTypeKey: "Annual", FromDate: Date(2026,6,01), ToDate: Date(2026,6,03), Days: 3, Status: "Pending", ManagerId: 3, SubmittedOn: Now(), Reason: "Family vacation"},
            {Title: "Bob Lee - Sick Request", EmployeeId: 2, LeaveTypeKey: "Sick", FromDate: Date(2026,5,20), ToDate: Date(2026,5,20), Days: 1, Status: "Approved", ManagerId: 3, SubmittedOn: Now() - 10, Reason: "Doctor appointment"}
          )
        )
      );

      // Read data from SharePoint lists into local collections
      ClearCollect(colLeaveTypes, 
        ShowColumns(
          AddColumns(LeaveTypes, "DisplayName", Title), 
          "ID", "Key", "DisplayName"
        )
      );

      ClearCollect(colEmployees, 
        ShowColumns(
          AddColumns(Employees, "Id", EmployeeId, "DisplayName", Title), 
          "Id", "DisplayName", "Email", "ManagerId"
        )
      );

      ClearCollect(colLeaveBalances, 
        ShowColumns(
          AddColumns(LeaveBalances, "Id", EmployeeId), 
          "EmployeeId", "LeaveTypeKey", "BalanceDays"
        )
      );

      ClearCollect(colLeaveRequests, 
        ShowColumns(
          AddColumns(LeaveRequests_1, "Id", ID), 
          "Id", "EmployeeId", "LeaveTypeKey", "FromDate", "ToDate", "Days", "Status", "ManagerId", "SubmittedOn", "Reason", "RejectionReason"
        )
      );

      Set(isLoading, false);
      // Initialize commonly used variables to non-Blank values so the compiler can infer types
      Set(selectedRequest, First(colLeaveRequests));
      Set(selectedLeaveType, First(colLeaveTypes));
      Set(Days, 0);
      Set(SampleCardImage, "");
      Set(SampleCardHeaderImage, "");
      Set(Progress, 0);
      Set(Descending, true);

      // Dynamically resolve current user by email
      Set(currentUserEmail, User().Email);
      Set(currentUserRecord, LookUp(colEmployees, Email = currentUserEmail));
      If(IsBlank(currentUserRecord),
        // If not found in the list, default to Alice (EmployeeId = 1) for testing
        Set(currentUserRecord, LookUp(colEmployees, Id = 1))
      );
      Set(currentUserId, Coalesce(currentUserRecord.Id, 1));
      Set(currentUserIsManager, Coalesce(currentUserRecord.ManagerId, 0) = 0 || CountRows(Filter(colEmployees, ManagerId = currentUserId)) > 0);



