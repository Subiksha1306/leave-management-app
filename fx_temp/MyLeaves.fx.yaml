MyLeaves As screen:

    OnVisible: =ClearCollect(colMyLeaves, Filter(colLeaveRequests, EmployeeId = currentUserId));

    MyLeaves_Title As moderntext:
        Text: ="My Leaves"
        Color: =TextColor
        FontWeight: =FontWeight.Bold
        Size: =24
        X: =16
        Y: =16

    Refresh As modernbutton:
        Text: ="Refresh"
        BasePaletteColor: =PrimaryColor
        Color: =RGBA(255,255,255,1)
        X: =16
        Y: =56
        OnSelect: =ClearCollect(colMyLeaves, Filter(colLeaveRequests, EmployeeId = currentUserId))

    LeavesGrid As moderndatagrid:
        Items: =colMyLeaves
        X: =16
        Y: =100
        Width: =Parent.Width - 32
        Height: =560
        OnChange: =Set(selectedRequest, LeavesGrid.Selected)

    SelectedText As moderntext:
        Text: ="Selected: " & If(!IsBlank(selectedRequest), selectedRequest.LeaveTypeKey & " (" & selectedRequest.Status & ")", "No request selected")
        Color: =TextColor
        X: =16
        Y: =680
        Size: =14