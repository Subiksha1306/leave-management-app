App:
  Properties:
    StartScreen: =Dashboard
    Formulas: |-
      =// Named constants and helper functions
      PrimaryColor = RGBA(56,96,178,1);
      AccentColor = RGBA(255,90,60,1);
      BackgroundColor = RGBA(250,250,250,1);
      CardColor = RGBA(255,255,255,1);
      TextColor = RGBA(33,33,33,1);

      // Status color helper
      GetStatusColor(status: Text): Color =
        If(
          status = "Approved", RGBA(34,197,94,1),
          status = "Rejected", RGBA(239,68,68,1),
          status = "Pending", RGBA(245,158,11,1),
          RGBA(107,114,128,1) // default/unknown
        );

      // Date range text helper
      FormatDateRange(fromDate: DateTime, toDate: DateTime): Text =
        If(
          fromDate = toDate,
          Text(fromDate, "mmmm d, yyyy"),
          Text(fromDate, "mmmm d, yyyy") & " â€“ " & Text(toDate, "mmmm d, yyyy")
        );

    OnStart: |-
      =// Mock data for initial development. Replace ClearCollect calls with real data source connections after discovery.
      ClearCollect(colLeaveTypes,
        Table(
          {Id: 1, Key: "Annual", DisplayName: "Annual Leave"},
          {Id: 2, Key: "Sick", DisplayName: "Sick Leave"},
          {Id: 3, Key: "Unpaid", DisplayName: "Unpaid Leave"}
        )
      );

      ClearCollect(colEmployees,
        Table(
          {Id: 1, DisplayName: "Alice Johnson", Email: "alice@contoso.com", ManagerId: 3},
          {Id: 2, DisplayName: "Bob Lee", Email: "bob@contoso.com", ManagerId: 3},
          {Id: 3, DisplayName: "Carol Smith", Email: "carol@contoso.com", ManagerId: 0}
        )
      );

      ClearCollect(colLeaveBalances,
        Table(
          {EmployeeId: 1, LeaveTypeKey: "Annual", BalanceDays: 12},
          {EmployeeId: 1, LeaveTypeKey: "Sick", BalanceDays: 8},
          {EmployeeId: 2, LeaveTypeKey: "Annual", BalanceDays: 5},
          {EmployeeId: 2, LeaveTypeKey: "Sick", BalanceDays: 10}
        )
      );

      ClearCollect(colLeaveRequests,
        Table(
          {Id: 1001, EmployeeId: 1, LeaveTypeKey: "Annual", FromDate: Date(2026,6,01), ToDate: Date(2026,6,03), Days: 3, Status: "Pending", ManagerId: 3, SubmittedOn: Date(2026,5,01)},
          {Id: 1002, EmployeeId: 2, LeaveTypeKey: "Sick", FromDate: Date(2026,5,20), ToDate: Date(2026,5,20), Days: 1, Status: "Approved", ManagerId: 3, SubmittedOn: Date(2026,5,19)}
        )
      );

      Set(isLoading, false);
      // Initialize commonly used variables to non-Blank values so the compiler can infer types
      Set(selectedRequest, First(colLeaveRequests));
      Set(selectedLeaveType, First(colLeaveTypes));
      Set(Days, 0);
      Set(SampleCardImage, "");
      Set(SampleCardHeaderImage, "");
      Set(Progress, 0);
      Set(Descending, true);
      Set(currentUserId, 1);
      Set(currentUserIsManager, LookUp(colEmployees, Id = currentUserId, ManagerId) = 0);



